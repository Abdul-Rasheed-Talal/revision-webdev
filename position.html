<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Positions</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body {
      position: relative;
      background-color: #141414;
    }
    .first {
        
      position: sticky;
      top: 0px;
      width: 600px;
      height: 50px;
      background-color: rgb(170, 103, 9);
    }
    .second {
      width: 100px;
      height: 100px;
      background-color: aqua;
      position: fixed;
      z-index: -1;
      filter: blur(20px);
      opacity: 0.5;
    }
    .third {
      position: absolute;
      top: 50px;
      width: 50px;
      right: 50px;
      height: 50px;
      background-color: rgb(30, 8, 200);
    }
  </style>
  <body>
      
      <div class="first"></div>
      <div class="second"></div>
      <div class="third"></div>
      
  </body>
</html>
