<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
</head>
<body>
    <style>
        header{
            margin-top: 20px;
        }
        *{
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* outline: 2px solid red; */
        }
        .logo h1{
           display: inline;
           margin-left: 200px;
        }
        .logo{
            width: 50vw;
            margin: auto;
        }
        nav ul{
            width: 50vw;
            margin: auto;
            padding: 20px;
        }
        nav ul li{
            display: inline;
            padding: 20px;
            list-style: none;
        }
        nav ul li a{
            text-decoration: none;
            text-align: center;
            font-size: large;
            color: black;
            padding: 2px;
        }
        nav ul li a:active{
            color: green;
        }
        nav ul li a:hover{
            /* border: 1px solid green; */
            border-radius: 9px;
            color: gray;
            transition: ease-in-out 0.7s;
        }
    </style>
    <header>
        <div class="logo">
            <img height="50" width="50" src="https://images.unsplash.com/photo-1599305445671-ac291c95aaa9?q=80&w=1169&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <h1>Aiman Express</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Bundle Deals</a> </li>
                <li><a href="#">Choice</a></li>
                <li><a href="#">Super Deals </a></li>
                <li><a href="#">Ali Express Business</a></li>
                <li><a href="#">Automotive</a></li>
                <li><a href="#">Appliance</a></li>
            </ul>
        </nav>
    </header>
</body>
</html>
